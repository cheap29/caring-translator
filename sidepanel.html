<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>ギャル翻訳</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto,
          "ヒラギノ角ゴ ProN", "Noto Sans JP", sans-serif;
        margin: 0;
        font-size: 16px;
      }
      header {
        padding: 12px 14px;
        border-bottom: 1px solid #eee;
        font-weight: 600;
      }
      .wrap {
        padding: 12px 14px;
      }
      .status {
        color: #666;

        margin-bottom: 8px;
      }
      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .card {
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .card h3 {
        margin: 0 0 8px;
      }
    </style>
  </head>
  <body>
    <header>ギャル翻訳（Side Panel）</header>
    <div class="wrap">
      <div id="status" class="status">
        右クリック→「ギャル翻訳」を実行してください。
      </div>
      <div id="content"></div>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
